name: Daily Trends

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 06:00 Asia/Shanghai = 22:00 UTC on the previous day.
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-trends:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENABLE_OPENAI_SUMMARY: ${{ vars.ENABLE_OPENAI_SUMMARY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      OPENAI_TIMEOUT_SECONDS: ${{ vars.OPENAI_TIMEOUT_SECONDS }}
      OPENAI_MAX_RETRIES: ${{ vars.OPENAI_MAX_RETRIES }}
      SMTP_HOST: ${{ vars.SMTP_HOST }}
      SMTP_PORT: ${{ vars.SMTP_PORT }}
      SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: ${{ vars.SMTP_USE_TLS }}
      SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL }}
      SMTP_TIMEOUT_SECONDS: ${{ vars.SMTP_TIMEOUT_SECONDS }}
      EMAIL_FROM: ${{ vars.EMAIL_FROM }}
      EMAIL_TO: ${{ vars.EMAIL_TO }}
      EMAIL_SUBJECT_PREFIX: ${{ vars.EMAIL_SUBJECT_PREFIX }}
      EMAIL_ATTACH_MARKDOWN: ${{ vars.EMAIL_ATTACH_MARKDOWN }}
      REDDIT_SUBREDDITS: ${{ vars.REDDIT_SUBREDDITS }}
      NEWS_RSS_FEED: ${{ vars.NEWS_RSS_FEED }}
      GITHUB_TRENDING_LANGUAGES: ${{ vars.GITHUB_TRENDING_LANGUAGES }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: AI preflight check
        continue-on-error: true
        run: |
          python -c "
          import os
          from openai import OpenAI

          api_key = os.getenv('OPENAI_API_KEY', '').strip()
          model = os.getenv('OPENAI_MODEL', '').strip() or 'gpt-4.1-mini'
          base_url = os.getenv('OPENAI_BASE_URL', '').strip() or 'default-openai-base-url'
          timeout_seconds = int((os.getenv('OPENAI_TIMEOUT_SECONDS', '') or '45').strip())

          print(f'AI preflight model={model}')
          print(f'AI preflight base_url={base_url}')
          print(f'AI preflight timeout={timeout_seconds}')

          if not api_key:
              raise RuntimeError('OPENAI_API_KEY is missing')

          client = OpenAI(
              api_key=api_key,
              base_url=None if base_url == 'default-openai-base-url' else base_url,
              timeout=timeout_seconds,
              max_retries=0,
          )

          response = client.chat.completions.create(
              model=model,
              messages=[
                  {'role': 'system', 'content': 'Reply with exactly: ok'},
                  {'role': 'user', 'content': 'ping'},
              ],
              temperature=0,
              max_tokens=8,
          )

          content = (response.choices[0].message.content or '').strip()
          print(f'AI preflight response={content}')
          "

      - name: Run daily trends bot
        run: python main.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports
          git diff --cached --quiet && exit 0
          git commit -m "chore: update daily trends report"
          git push
